name: Build Module

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.module }}:${{ github.sha }}
          
          docker build \
            --build-arg MODULE=${{ inputs.module }} \
            -f build.dockerfile \
            -t $IMAGE \
            .

      - name: Push Docker
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.module }}:${{ github.sha }}
          docker push $IMAGE

      - name: Update GitOps repository
        shell: bash
        env:
          GIT_TOKEN: ${{ secrets.GITOPS_PAT }}
        run: |
            # Configure git credential store
            git config --global credential.helper store
            echo "https://${GIT_TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials
            
            # Remove any existing gitops directory
            rm -rf gitops
            
            # Clone repository using HTTPS URL without token
            git clone https://github.com/mikejohnpp/FinalGraduateProjectConfig.git gitops
            cd gitops     
            
            sed -i "s|image: ghcr.io/${{ github.repository_owner }}/${{ inputs.module }}:.*|image: ghcr.io/${{ github.repository_owner }}/${{ inputs.module }}:${{ github.sha }}|g" ${{ inputs.module }}-app/deployment.yaml
            
            # Commit changes
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add ${{ inputs.module }}-app/deployment.yaml
            git commit -m "Update image to ${{ github.sha }}"
            
            # Push
            git push -f https://${GIT_TOKEN}@github.com/mikejohnpp/FinalGraduateProjectConfig.git main